<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" role="img" aria-label="Pixel operator at a MacBook with coffee">
  <!-- Floor / desk shadow -->
  <rect x="4" y="54" width="56" height="4" fill="#c4b5a0"/>
  <rect x="8" y="52" width="48" height="2" fill="#d8cbb8"/>

  <!-- Desk -->
  <rect x="6" y="40" width="52" height="3" fill="#8b7355"/>
  <rect x="6" y="43" width="52" height="2" fill="#6e5a42"/>
  <rect x="10" y="45" width="3" height="9" fill="#6e5a42"/>
  <rect x="51" y="45" width="3" height="9" fill="#6e5a42"/>

  <!-- Coffee mug -->
  <rect x="48" y="34" width="7" height="6" fill="#f4f0e8"/>
  <rect x="49" y="33" width="5" height="1" fill="#f4f0e8"/>
  <rect x="55" y="35" width="2" height="3" fill="#e8e2d6"/>
  <rect x="49" y="35" width="5" height="3" fill="#6b3f2a"/>
  <!-- Steam -->
  <rect x="50" y="29" width="1" height="3" fill="#a8b5b0"/>
  <rect x="52" y="28" width="1" height="3" fill="#a8b5b0"/>
  <rect x="54" y="30" width="1" height="2" fill="#a8b5b0"/>

  <!-- MacBook base -->
  <rect x="14" y="37" width="28" height="3" fill="#c5c9ce"/>
  <rect x="13" y="39" width="30" height="1" fill="#9aa0a6"/>
  <!-- Trackpad hint -->
  <rect x="24" y="37" width="8" height="2" fill="#b0b5bb"/>

  <!-- MacBook screen -->
  <rect x="16" y="22" width="24" height="15" fill="#2a3038"/>
  <rect x="17" y="23" width="22" height="13" fill="#0d1117"/>
  <!-- Screen glow / terminal lines -->
  <rect x="19" y="25" width="10" height="1" fill="#3d9ead"/>
  <rect x="19" y="27" width="14" height="1" fill="#3d6b4f"/>
  <rect x="19" y="29" width="8" height="1" fill="#5a8f6a"/>
  <rect x="19" y="31" width="12" height="1" fill="#3d9ead"/>
  <rect x="19" y="33" width="6" height="1" fill="#c4784a"/>
  <!-- Bezel cam -->
  <rect x="27" y="22" width="2" height="1" fill="#1a1e24"/>

  <!-- Chair back -->
  <rect x="22" y="36" width="14" height="2" fill="#3a4550"/>
  <rect x="20" y="30" width="3" height="8" fill="#3a4550"/>
  <rect x="35" y="30" width="3" height="8" fill="#3a4550"/>

  <!-- Person body / hoodie (cyber-dark) -->
  <rect x="24" y="28" width="12" height="10" fill="#2c3540"/>
  <rect x="23" y="30" width="2" height="6" fill="#24303a"/>
  <rect x="35" y="30" width="2" height="6" fill="#24303a"/>
  <!-- Sleeve accents (teal trim) -->
  <rect x="23" y="34" width="2" height="1" fill="#3d9ead"/>
  <rect x="35" y="34" width="2" height="1" fill="#3d9ead"/>

  <!-- Arms on keyboard -->
  <rect x="20" y="34" width="6" height="3" fill="#c4a484"/>
  <rect x="34" y="34" width="6" height="3" fill="#c4a484"/>
  <rect x="22" y="36" width="4" height="1" fill="#b8956f"/>
  <rect x="34" y="36" width="4" height="1" fill="#b8956f"/>

  <!-- Head -->
  <rect x="26" y="16" width="8" height="8" fill="#c4a484"/>
  <rect x="25" y="18" width="1" height="4" fill="#c4a484"/>
  <rect x="34" y="18" width="1" height="4" fill="#c4a484"/>
  <!-- Hair -->
  <rect x="25" y="15" width="10" height="3" fill="#2a2420"/>
  <rect x="26" y="14" width="8" height="1" fill="#2a2420"/>
  <rect x="25" y="18" width="2" height="2" fill="#2a2420"/>
  <rect x="33" y="18" width="2" height="2" fill="#2a2420"/>
  <!-- Eyes -->
  <rect x="27" y="19" width="2" height="2" fill="#1a1e24"/>
  <rect x="31" y="19" width="2" height="2" fill="#1a1e24"/>
  <!-- Screen glow on face -->
  <rect x="28" y="21" width="4" height="1" fill="#3d9ead" opacity="0.45"/>
  <!-- Mouth slight smile -->
  <rect x="29" y="22" width="2" height="1" fill="#a07a58"/>

  <!-- Neck -->
  <rect x="28" y="24" width="4" height="2" fill="#c4a484"/>
  <!-- Hoodie collar -->
  <rect x="26" y="25" width="8" height="3" fill="#2c3540"/>
  <rect x="27" y="26" width="6" height="1" fill="#3d9ead"/>
</svg>

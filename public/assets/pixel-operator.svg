<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- High-contrast pixel operator: dark room, MacBook, coffee -->
  <rect width="80" height="80" fill="none"/>

  <!-- Desk -->
  <rect x="8" y="52" width="64" height="4" fill="#2a2f38"/>
  <rect x="8" y="56" width="64" height="2" fill="#1a1e26"/>
  <rect x="12" y="58" width="4" height="12" fill="#1a1e26"/>
  <rect x="64" y="58" width="4" height="12" fill="#1a1e26"/>

  <!-- Mug + coffee + steam -->
  <rect x="60" y="44" width="9" height="8" fill="#c8cdd4"/>
  <rect x="61" y="43" width="7" height="1" fill="#c8cdd4"/>
  <rect x="69" y="46" width="2" height="4" fill="#9aa3ad"/>
  <rect x="61" y="45" width="7" height="5" fill="#4a2818"/>
  <rect x="62" y="38" width="1" height="4" fill="#5a6a72"/>
  <rect x="64" y="37" width="1" height="4" fill="#5a6a72"/>
  <rect x="66" y="39" width="1" height="3" fill="#5a6a72"/>

  <!-- MacBook -->
  <rect x="18" y="48" width="36" height="4" fill="#8b929a"/>
  <rect x="17" y="51" width="38" height="1" fill="#6b727a"/>
  <rect x="30" y="48" width="12" height="3" fill="#7a8189"/>
  <rect x="20" y="28" width="32" height="20" fill="#1e232b"/>
  <rect x="21" y="29" width="30" height="17" fill="#0b0e12"/>
  <!-- Terminal -->
  <rect x="24" y="32" width="12" height="1" fill="#3dffa8"/>
  <rect x="24" y="35" width="18" height="1" fill="#3dd6ff"/>
  <rect x="24" y="38" width="10" height="1" fill="#3dffa8"/>
  <rect x="24" y="41" width="15" height="1" fill="#6b727a"/>
  <rect x="35" y="28" width="2" height="1" fill="#3a4048"/>

  <!-- Chair -->
  <rect x="28" y="46" width="18" height="3" fill="#151920"/>
  <rect x="26" y="38" width="3" height="10" fill="#151920"/>
  <rect x="45" y="38" width="3" height="10" fill="#151920"/>

  <!-- Body -->
  <rect x="30" y="36" width="16" height="12" fill="#141820"/>
  <rect x="28" y="40" width="3" height="6" fill="#10141a"/>
  <rect x="45" y="40" width="3" height="6" fill="#10141a"/>
  <rect x="28" y="44" width="3" height="1" fill="#3dd6ff"/>
  <rect x="45" y="44" width="3" height="1" fill="#3dd6ff"/>

  <!-- Arms -->
  <rect x="24" y="44" width="8" height="4" fill="#c9a07a"/>
  <rect x="44" y="44" width="8" height="4" fill="#c9a07a"/>

  <!-- Head -->
  <rect x="32" y="20" width="12" height="11" fill="#c9a07a"/>
  <rect x="31" y="22" width="1" height="6" fill="#c9a07a"/>
  <rect x="44" y="22" width="1" height="6" fill="#c9a07a"/>
  <rect x="31" y="18" width="14" height="4" fill="#1a1512"/>
  <rect x="32" y="17" width="12" height="1" fill="#1a1512"/>
  <rect x="31" y="22" width="3" height="3" fill="#1a1512"/>
  <rect x="42" y="22" width="3" height="3" fill="#1a1512"/>
  <rect x="34" y="24" width="2" height="2" fill="#0b0e12"/>
  <rect x="40" y="24" width="2" height="2" fill="#0b0e12"/>
  <rect x="35" y="27" width="6" height="1" fill="#3dd6ff" opacity="0.5"/>
  <rect x="36" y="28" width="4" height="1" fill="#a07a58"/>
  <rect x="34" y="30" width="8" height="3" fill="#141820"/>
  <rect x="35" y="31" width="6" height="1" fill="#3dd6ff"/>
</svg>
